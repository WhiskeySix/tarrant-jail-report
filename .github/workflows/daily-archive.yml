name: Daily Jail Report Archive

on:
  workflow_dispatch:
  schedule:
    - cron: "45 13 * * *"

permissions:
  contents: write

concurrency:
  group: daily-jail-report-archive
  cancel-in-progress: true

jobs:
  daily-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Save Day 01 archive report
        env:
          BOOKED_BASE_URL: ${{ secrets.BOOKED_BASE_URL }}
        run: |
          python archive_reports.py --mode daily
          echo "----- archive directory listing -----"
          find output/archive -maxdepth 4 -type f | sort || true

      - name: Upload archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jail-report-daily-archive
          path: output/archive/

      - name: Commit archive files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/archive/**/*.json output/archive/*.json || true
          git commit -m "Daily jail report archive" || echo "No changes to commit"
          git push || echo "Nothing to push"