name: Daily Jail Report Archive

on:
  workflow_dispatch:
  schedule:
    # Runs after the main daily report job. 14:15 UTC = 8:15 AM CST / 9:15 AM CDT.
    - cron: "15 14 * * *"

permissions:
  contents: write

jobs:
  daily-archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive latest report JSON
        env:
          BOOKED_BASE_URL: ${{ secrets.BOOKED_BASE_URL }}
        run: |
          python archive_reports.py --mode daily
          echo "----- archive directory listing -----"
          find output/archive -maxdepth 4 -type f | sort

      - name: Upload archive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-archive
          path: output/archive/

      - name: Commit archive files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/archive/ || true
          git commit -m "Archive latest jail report JSON" || echo "No changes to commit"
          git push || echo "Nothing to push"
